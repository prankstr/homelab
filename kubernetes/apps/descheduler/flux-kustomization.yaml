apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: descheduler
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: cluster-addons
  path: ./kubernetes/apps/descheduler/app
  prune: true
  wait: true
  targetNamespace: descheduler
